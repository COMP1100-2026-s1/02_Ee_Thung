<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UQ-Connect Prototype Sketch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .phone-container {
            width: 375px;
            height: 700px;
            background: white;
            border: 12px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .notch {
            width: 150px;
            height: 25px;
            background: #1a1a1a;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }
        .status-bar { height: 40px; padding: 0 20px; display: flex; align-items: flex-end; justify-content: space-between; font-size: 12px; font-weight: 600; }
        .nav-active { color: #51247a; font-weight: 700; }
        .nav-active svg { stroke: #51247a; stroke-width: 3px; }
        
        .skill-newbie { background-color: #dcfce7; color: #166534; }
        .skill-hobbyist { background-color: #fef9c3; color: #854d0e; }
        .skill-pro { background-color: #fee2e2; color: #991b1b; }
        
        .uq-purple { background-color: #51247a; }
        .uq-purple-text { color: #51247a; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* Modal Animation */
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen py-10">

    <div class="mb-8 text-center max-w-2xl px-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">UQ-Connect Prototype</h1>
        <p class="text-gray-600">Iterative sketch of UQ connect solution. Now featuring a <strong>Clubs Directory</strong> with advanced filtering and integrated search.</p>
    </div>

    <!-- Phone Mockup -->
    <div class="phone-container" id="app-screen">
        <div class="notch"></div>
        <div class="status-bar">
            <span>9:41</span>
            <div class="flex space-x-1">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A1 1 0 013.293 7.879l7 7 7-7a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div id="main-content" class="h-full pb-20 overflow-y-auto hide-scroll">
            <!-- Content Injected via JS -->
        </div>

        <!-- Club Detail Modal (Hidden by default) -->
        <div id="club-modal" class="absolute inset-0 bg-black/50 z-50 hidden flex items-end">
            <div class="bg-white w-full h-[90%] rounded-t-[40px] slide-up overflow-y-auto hide-scroll p-6 relative">
                <button onclick="closeClubDetail()" class="absolute top-4 right-6 text-gray-400 text-2xl">&times;</button>
                <div id="modal-body"></div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="absolute bottom-0 w-full bg-white border-t flex justify-around items-center h-20 px-2 z-40">
            <button onclick="renderFeed()" class="flex flex-col items-center nav-item" id="nav-feed">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path></svg>
                <span class="text-[10px] mt-1">Live Feed</span>
            </button>
            <button onclick="renderClubs()" class="flex flex-col items-center nav-item" id="nav-clubs">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                <span class="text-[10px] mt-1">Clubs</span>
            </button>
            <button onclick="renderOpenSocials()" class="flex flex-col items-center nav-item" id="nav-socials">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span class="text-[10px] mt-1">Open Social</span>
            </button>
            <button onclick="renderPathfinder()" class="flex flex-col items-center nav-item" id="nav-pathfinder">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                <span class="text-[10px] mt-1">Pathfinder</span>
            </button>
        </div>
    </div>

    <script>
        const content = document.getElementById('main-content');
        const clubModal = document.getElementById('club-modal');
        const modalBody = document.getElementById('modal-body');

        // Mock Club Data
        const clubsData = [
            { id: 1, name: "UQCS", cat: "Academic", sub: "Informatics", price: 2.00, desc: "The official computer science club at UQ. We run hackathons and tech talks.", ig: "@uqcs", discord: "discord.gg/uqcs", memory: "HackRes 2025: 300+ coders, 48 hours." },
            { id: 2, name: "UQ Tennis", cat: "Non-Academic", sub: "Sport", price: 10.00, desc: "Social tennis for all levels. Weekly social fixtures at UQ Sport.", ig: "@uqtennis", discord: "N/A", memory: "O-Week Social Match: 50 new members!" },
            { id: 3, name: "Bakeology", cat: "Non-Academic", sub: "Hobby", price: 5.00, desc: "Sharing the love of baking. From brownies to sourdough workshops.", ig: "@uqbake", discord: "N/A", memory: "Cupcake Night: Distributed 200 free cakes." },
            { id: 4, name: "UQ Dance", cat: "Non-Academic", sub: "Art", price: 8.00, desc: "A creative space for dancers. K-Pop, Hip-hop, and Contemporary styles.", ig: "@uqdance", discord: "N/A", memory: "Semester Showcase 2024 at Schonell Theatre." },
            { id: 5, name: "Psych Society", cat: "Academic", sub: "Psychology", price: 2.00, desc: "Connecting Psych students for study and social support.", ig: "@uqpsych", discord: "discord.gg/uqpsych", memory: "Mental Health Trivia Night." },
            { id: 6, name: "Cyber Squad", cat: "Academic", sub: "Informatics", price: 0.00, desc: "Capture The Flag competitions and defensive security training.", ig: "@uqcyber", discord: "discord.gg/uqcyber", memory: "DownUnderCTF winners circle." }
        ];

        function clearNav() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
        }

        // --- RENDER HOME FEED ---
        function renderFeed() {
            clearNav();
            document.getElementById('nav-feed').classList.add('nav-active');
            content.innerHTML = `
                <div class="p-5">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <h2 class="text-2xl font-bold uq-purple-text">Live Feed</h2>
                            <p class="text-xs text-gray-500">Discover events starting soon</p>
                        </div>
                        <div class="bg-gray-100 p-2 rounded-full cursor-pointer">
                            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        </div>
                    </div>

                    <!-- Search Bar -->
                    <div class="relative mb-4">
                        <input type="text" placeholder="Search events..." class="w-full bg-gray-50 border-0 rounded-2xl p-4 pl-12 text-sm focus:ring-2 focus:ring-purple-400">
                        <svg class="w-5 h-5 absolute left-4 top-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>

                    <!-- Filter Chips -->
                    <div class="flex space-x-2 overflow-x-auto pb-4 hide-scroll">
                        <span class="bg-purple-600 text-white text-xs px-4 py-2 rounded-full font-bold whitespace-nowrap">🔥 All Live</span>
                        <span class="bg-gray-100 text-gray-600 text-xs px-4 py-2 rounded-full font-bold whitespace-nowrap">Sports</span>
                        <span class="bg-gray-100 text-gray-600 text-xs px-4 py-2 rounded-full font-bold whitespace-nowrap">IT & Cyber</span>
                        <span class="bg-gray-100 text-gray-600 text-xs px-4 py-2 rounded-full font-bold whitespace-nowrap">Low Price</span>
                    </div>

                    <div class="space-y-4">
                        <!-- Activity Card -->
                        <div class="border rounded-2xl p-4 shadow-sm bg-white cursor-pointer hover:border-purple-300 transition-all">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold px-2 py-1 bg-purple-100 text-purple-700 rounded-full">Starting in 15m</span>
                                <span class="text-xs font-semibold px-2 py-1 skill-newbie rounded-md">Tier: Newbie</span>
                            </div>
                            <h3 class="font-bold text-lg">Social Tennis</h3>
                            <p class="text-sm text-gray-600 mb-2">📍 UQ Sport Courts (Court 4)</p>
                            <div class="flex items-center text-xs text-gray-400">
                                <div class="flex -space-x-2 mr-2">
                                    <div class="w-6 h-6 rounded-full bg-blue-400 border-2 border-white"></div>
                                    <div class="w-6 h-6 rounded-full bg-red-400 border-2 border-white"></div>
                                    <div class="w-6 h-6 rounded-full bg-green-400 border-2 border-white"></div>
                                </div>
                                <span>+8 others joined</span>
                            </div>
                        </div>

                        <div class="border rounded-2xl p-4 shadow-sm bg-white">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold px-2 py-1 bg-gray-100 text-gray-600 rounded-full">Today at 2:00 PM</span>
                                <span class="text-xs font-semibold px-2 py-1 skill-hobbyist rounded-md">Tier: Hobbyist</span>
                            </div>
                            <h3 class="font-bold text-lg">Python & Coffee Session</h3>
                            <p class="text-sm text-gray-600 mb-2">📍 Merlo Coffee, IT Library</p>
                            <span class="text-[10px] uq-purple text-white px-2 py-1 rounded">Vibe: Chill Study</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- RENDER CLUBS DIRECTORY ---
        function renderClubs() {
            clearNav();
            document.getElementById('nav-clubs').classList.add('nav-active');
            content.innerHTML = `
                <div class="p-5">
                    <h2 class="text-2xl font-bold uq-purple-text mb-1">UQ Clubs</h2>
                    <p class="text-xs text-gray-500 mb-4">Browse 220+ societies at UQ</p>

                    <!-- Search Bar -->
                    <div class="relative mb-4">
                        <input type="text" placeholder="Search by name..." class="w-full bg-gray-50 border-0 rounded-2xl p-4 pl-12 text-sm focus:ring-2 focus:ring-purple-400">
                        <svg class="w-5 h-5 absolute left-4 top-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>

                    <!-- Category Filters -->
                    <div class="mb-6">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-2">Main Category</label>
                        <div class="flex space-x-2">
                            <button class="flex-1 py-2 text-xs font-bold rounded-xl uq-purple text-white shadow-md">All</button>
                            <button class="flex-1 py-2 text-xs font-bold rounded-xl bg-gray-100 text-gray-600">Academic</button>
                            <button class="flex-1 py-2 text-xs font-bold rounded-xl bg-gray-100 text-gray-600">Non-Academic</button>
                        </div>
                    </div>

                    <div class="flex space-x-2 overflow-x-auto pb-4 hide-scroll mb-2">
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">⚽ Sport</span>
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">🎨 Art</span>
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">🍕 Hobby</span>
                        <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-1 rounded-full font-bold whitespace-nowrap">💰 $0 - $5</span>
                    </div>

                    <div class="grid grid-cols-2 gap-3" id="clubs-list">
                        ${clubsData.map(club => `
                            <div onclick="openClubDetail(${club.id})" class="bg-white border rounded-2xl p-4 shadow-sm hover:border-purple-400 transition-all cursor-pointer">
                                <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center font-bold text-purple-700 mb-2">
                                    ${club.name[0]}
                                </div>
                                <h3 class="font-bold text-sm">${club.name}</h3>
                                <p class="text-[10px] text-gray-400 mb-2">${club.sub}</p>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-[10px] font-bold uq-purple-text">$${club.price.toFixed(2)}</span>
                                    <svg class="w-4 h-4 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- CLUB DETAIL VIEW ---
        function openClubDetail(id) {
            const club = clubsData.find(c => c.id === id);
            if (!club) return;

            modalBody.innerHTML = `
                <div class="flex items-center space-x-4 mb-6">
                    <div class="w-16 h-16 rounded-full uq-purple flex items-center justify-center font-bold text-white text-2xl shadow-lg">
                        ${club.name[0]}
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold">${club.name}</h2>
                        <span class="text-xs px-2 py-1 bg-purple-50 text-purple-600 rounded-lg font-semibold">${club.cat} &bull; ${club.sub}</span>
                    </div>
                </div>

                <div class="space-y-6">
                    <section>
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Description</h4>
                        <p class="text-sm text-gray-600 leading-relaxed">${club.desc}</p>
                    </section>

                    <section class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center">
                        <div>
                            <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Membership Price</h4>
                            <p class="text-xl font-bold uq-purple-text">$${club.price.toFixed(2)} <span class="text-[10px] text-gray-400">/ year</span></p>
                        </div>
                        <button class="uq-purple text-white font-bold py-2 px-6 rounded-xl shadow-md">Join Now</button>
                    </section>

                    <section>
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Socials</h4>
                        <div class="flex space-x-4">
                            <div class="flex flex-col items-center">
                                <div class="w-10 h-10 rounded-full bg-pink-50 flex items-center justify-center text-pink-600 font-bold border border-pink-100">IG</div>
                                <span class="text-[9px] mt-1 text-gray-500">${club.ig}</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 font-bold border border-blue-100">DC</div>
                                <span class="text-[9px] mt-1 text-gray-500">${club.discord}</span>
                            </div>
                        </div>
                    </section>

                    <section>
                        <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Memories & Highlights</h4>
                        <div class="bg-gray-100 h-24 rounded-2xl p-4 flex items-center justify-center text-center">
                            <p class="text-xs italic text-gray-500">"${club.memory}"</p>
                        </div>
                    </section>
                </div>
            `;
            clubModal.classList.remove('hidden');
        }

        function closeClubDetail() {
            clubModal.classList.add('hidden');
        }

        // --- RENDER OPEN SOCIALS ---
        function renderOpenSocials() {
            clearNav();
            document.getElementById('nav-socials').classList.add('nav-active');
            content.innerHTML = `
                <div class="p-5">
                    <h2 class="text-2xl font-bold uq-purple-text">Host Open Social</h2>
                    <p class="text-sm text-gray-500 mb-6">Create an activity and find a buddy.</p>
                    
                    <form class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">What's the plan?</label>
                            <input type="text" placeholder="e.g. Bouldering at Urban Climb" class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-purple-400">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Activity Category</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button type="button" class="border rounded-lg py-2 text-xs font-bold uq-purple text-white bg-purple-600">Academic</button>
                                <button type="button" class="border rounded-lg py-2 text-xs text-gray-600 font-bold bg-gray-100 hover:bg-gray-200">Non-Academic</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-2">Activity Type</label>
                            <div class="flex space-x-2 overflow-x-auto pb-2 hide-scroll">
                                <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-2 rounded-full font-bold whitespace-nowrap cursor-pointer hover:bg-purple-100 hover:text-purple-600">⚽ Sport</span>
                                <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-2 rounded-full font-bold whitespace-nowrap cursor-pointer hover:bg-purple-100 hover:text-purple-600">🎨 Art</span>
                                <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-2 rounded-full font-bold whitespace-nowrap cursor-pointer hover:bg-purple-100 hover:text-purple-600">💻 Tech</span>
                                <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-2 rounded-full font-bold whitespace-nowrap cursor-pointer hover:bg-purple-100 hover:text-purple-600">🍕 Hobby</span>
                                <span class="bg-gray-100 text-gray-600 text-[10px] px-3 py-2 rounded-full font-bold whitespace-nowrap cursor-pointer hover:bg-purple-100 hover:text-purple-600">📚 Study</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Equipment Needed</label>
                            <input type="text" placeholder="e.g. Tennis rackets, painting supplies (optional)" class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-purple-400">
                            <p class="text-[10px] text-gray-400 mt-1">List any equipment required or that you'll provide</p>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Conditions & Notes</label>
                            <textarea placeholder="e.g. Weather dependent, outdoor activity, bring water" class="w-full border rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none" rows="3"></textarea>
                            <p class="text-[10px] text-gray-400 mt-1">Any special conditions, restrictions, or important details</p>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Skill Tier Requirement</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button type="button" class="border rounded-lg py-2 text-xs skill-newbie font-bold border-green-500">Newbie</button>
                                <button type="button" class="border rounded-lg py-2 text-xs text-gray-400 font-bold hover:skill-hobbyist">Hobbyist</button>
                                <button type="button" class="border rounded-lg py-2 text-xs text-gray-400 font-bold hover:skill-pro">Pro</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Price Per Person</label>
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-gray-600 font-bold">$</span>
                                <input type="number" step="0.01" min="0" placeholder="0.00" class="w-full border rounded-xl p-3 pl-8 focus:outline-none focus:ring-2 focus:ring-purple-400">
                            </div>
                            <p class="text-[10px] text-gray-400 mt-1">Leave as 0.00 if the activity is free</p>
                        </div>

                        <div class="bg-purple-50 p-4 rounded-2xl border border-purple-100">
                            <h4 class="text-sm font-bold uq-purple-text mb-1">Social Safety Check</h4>
                            <p class="text-[11px] text-gray-600">By setting a tier, you help others feel safe joining. We'll match you with students of the same level.</p>
                        </div>

                        <button type="button" class="w-full uq-purple text-white font-bold py-4 rounded-2xl shadow-lg mt-4">Broadcast Activity</button>
                    </form>
                </div>
            `;
        }

        // --- RENDER PATHFINDER HUB ---
        function renderPathfinder() {
            clearNav();
            document.getElementById('nav-pathfinder').classList.add('nav-active');
            content.innerHTML = `
                <div class="p-5">
                    <h2 class="text-2xl font-bold uq-purple-text">Pathfinder Hub</h2>
                    <p class="text-sm text-gray-500 mb-6">Too shy to go alone? Book a 1-on-1 mentor to walk you in.</p>
                    
                    <div class="space-y-4">
                        <div class="flex items-center p-4 border rounded-2xl bg-white shadow-sm">
                            <div class="w-12 h-12 rounded-full bg-purple-200 flex items-center justify-center font-bold text-purple-700 mr-4">RY</div>
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">Reino (Mentor)</h4>
